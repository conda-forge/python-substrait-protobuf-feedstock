schema_version: 1

context:
  version: "0.85.0"

package:
  name: python-substrait-protobuf
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/substrait-protobuf/substrait_protobuf-${{ version }}.tar.gz
  sha256: e7776181dcb18703a6e27b0291de86c8034a02b5d92e1fc2fc919ced62757570

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=80
    - pip
  run:
    - python >=${{ python_min }}
    - protobuf >=5,<7

tests:
  - python:
      imports:
        - substrait.plan_pb2
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Generated Substrait Protocol Buffer Code
  license: Apache-2.0
  # The 0.79.0 sdist does not bundle a license file; the LICENSE here is a vendored copy.
  # Upstream ships it from 0.97.0 on (substrait-io/substrait-packaging#29) — when bumping
  # this recipe to >=0.97.0, drop the vendored LICENSE and rely on the one in the sdist.
  license_file: LICENSE
  homepage: https://substrait.io
  repository: https://github.com/substrait-io/substrait-packaging

extra:
  recipe-maintainers:
    - benbellick
    - vbarua
    - nielspardon
